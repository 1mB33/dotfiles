set -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ",xterm-256color*:Tc"

set -g mouse on

# Start numbering windows & panes from 1 (instead of 0)
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set -g renumber-windows on

# unbind the default prefix (Ctrl‑b)
# set new prefix to Ctrl‑a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

setw -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection

# Reload config quickly
unbind r
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# Split panes retaining current working directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

set -g @plugin 'christoomey/vim-tmux-navigator'

set -g @plugin 'rose-pine/tmux'
set -g @plugin 'tmux-plugins/tpm'

# Configure Rosé Pine / “pinerose” theme options
# You can choose variant: main, moon, dawn
set -g @rose_pine_variant 'moon'  
# Enable showing user & host in status bar
# set -g @rose_pine_user 'on'
# set -g @rose_pine_host 'on'
# set -g @rose_pine_date_time '%Y-%m-%d %H:%M'
# set -g @rose_pine_show_current_program 'on'
# set -g @rose_pine_directory 'on'
# set -g @rose_pine_window_status_separator " | "

# Initialize TPM (this must come last)
run-shell 'test -d ~/.tmux/plugins/tpm || git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm'
run '~/.tmux/plugins/tpm/tpm'

